<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elegant Gems</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="logo">💎 Elegant Gems</div>
    <nav class="nav">
      <a href="#">Home</a>
      <a href="#">Collections</a>
      <a href="#">Rings</a>
      <a href="#">Necklaces</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1>Shine with Elegance</h1>
      <p>Discover handcrafted jewelry for every occasion</p>
      <button>Shop Now</button>
    </div>
  </section>

  <!-- Products -->
  <section class="products">
    <h2>Featured Collection</h2>
    <div class="product-grid">

      <div class="product-card">
        <img src="https://via.placeholder.com/250" alt="Ring">
        <h3>Diamond Ring</h3>
        <p>₹9,999</p>
        <button>Add to Cart</button>
      </div>

      <div class="product-card">
        <img src="https://via.placeholder.com/250" alt="Necklace">
        <h3>Gold Necklace</h3>
        <p>₹14,999</p>
        <button>Add to Cart</button>
      </div>

      <div class="product-card">
        <img src="https://via.placeholder.com/250" alt="Earrings">
        <h3>Elegant Earrings</h3>
        <p>₹4,999</p>
        <button>Add to Cart</button>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2026 Elegant Gems | All Rights Reserved</p>
  </footer>

</body>
</html>
